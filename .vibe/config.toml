# Core MCP tools for coding and local automation
[[mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = ["@playwright/mcp@latest"]
sampling_enabled = true

[[mcp_servers]]
name = "filesystem"
transport = "stdio"
command = "uvx"
args = ["mcp-server-filesystem", "/Users/shailesh/codebase-new/primary-school"]
sampling_enabled = true

[[mcp_servers]]
name = "fetch"
transport = "stdio"
command = "uvx"
args = ["mcp-server-fetch"]
sampling_enabled = true

[[mcp_servers]]
name = "git"
transport = "stdio"
command = "uvx"
args = ["mcp-server-git", "--repository", "/Users/shailesh/codebase-new/primary-school"]
sampling_enabled = true

[[mcp_servers]]
name = "memory"
transport = "stdio"
command = "uvx"
args = ["mcp-server-memory"]
sampling_enabled = true

[[mcp_servers]]
name = "time"
transport = "stdio"
command = "uvx"
args = ["mcp-server-time"]
sampling_enabled = true

[[mcp_servers]]
name = "sequential-thinking"
transport = "stdio"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]
sampling_enabled = true

# Data tool for analytics/query workflows.
[[mcp_servers]]
name = "clickhouse"
transport = "stdio"
command = "npx"
args = ["@clickhouse/mcp-clickhouse"]
env = { CLICKHOUSE_HOST = "127.0.0.1", CLICKHOUSE_PORT = "8123", CLICKHOUSE_USER = "default", CLICKHOUSE_PASSWORD = "dummy_password", CLICKHOUSE_DATABASE = "default", CLICKHOUSE_SECURE = "false" }
sampling_enabled = true

# SharePoint support via Microsoft 365 Graph tools.
# Note: --org-mode is required to expose SharePoint site/list/drive tools.
[[mcp_servers]]
name = "ms365-sharepoint"
transport = "stdio"
command = "npx"
args = ["-y", "@softeria/ms-365-mcp-server", "--org-mode"]
startup_timeout_sec = 45.0
tool_timeout_sec = 180.0
env = { MS365_MCP_ORG_MODE = "true", MS365_MCP_TENANT_ID = "common", MS365_MCP_CLOUD_TYPE = "global", LOG_LEVEL = "info" }
sampling_enabled = true

# Unix SSH remoting via native ssh/scp and ~/.ssh/config discovery.
[[mcp_servers]]
name = "ssh-remote"
transport = "stdio"
command = "npx"
args = ["-y", "@aiondadotcom/mcp-ssh"]
startup_timeout_sec = 30.0
tool_timeout_sec = 180.0
sampling_enabled = true



[[providers]]
name = "openai"
api_base = "http://127.0.0.1:1234/v1"  # Default local endpoint
api_key_env_var = ""                  # Not required for local
api_style = "openai"
backend = "generic"

[[models]]
name = "qwen3-next-80b"          # Exact name used by your local server
provider = "openai"
alias = "local-llama"
temperature = 0.2
input_price = 0.0
output_price = 0.0
