# ~/.vibe/config.toml

agent_loop = true
auto_tool_use = true
max_steps = 50

# Set the active model alias
active_model = "local-llama"

# Core MCP tools for coding and local automation
[[mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = ["@playwright/mcp@latest"]

[[mcp_servers]]
name = "filesystem"
transport = "stdio"
command = "uvx"
args = ["mcp-server-filesystem", "/Users/shailesh/codebase-new/primary-school"]

[[mcp_servers]]
name = "fetch"
transport = "stdio"
command = "uvx"
args = ["mcp-server-fetch"]

[[mcp_servers]]
name = "git"
transport = "stdio"
command = "uvx"
args = ["mcp-server-git", "--repository", "/Users/shailesh/codebase-new/primary-school"]

[[mcp_servers]]
name = "memory"
transport = "stdio"
command = "uvx"
args = ["mcp-server-memory"]

[[mcp_servers]]
name = "time"
transport = "stdio"
command = "uvx"
args = ["mcp-server-time"]

[[mcp_servers]]
name = "sequential-thinking"
transport = "stdio"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]

# Data tool for analytics/query workflows.
[[mcp_servers]]
name = "clickhouse"
transport = "stdio"
command = "npx"
args = ["@clickhouse/mcp-clickhouse"]
env = { CLICKHOUSE_HOST = "127.0.0.1", CLICKHOUSE_PORT = "8123", CLICKHOUSE_USER = "default", CLICKHOUSE_PASSWORD = "dummy_password", CLICKHOUSE_DATABASE = "default", CLICKHOUSE_SECURE = "false" }

# Optional credentialed tool example (uncomment when token is configured):
# [[mcp_servers]]
# name = "github"
# transport = "stdio"
# command = "npx"
# args = ["@modelcontextprotocol/server-github"]


[[providers]]
name = "openai"
api_base = "http://127.0.0.1:1234/v1"  # Default local endpoint
api_key_env_var = ""                  # Not required for local
api_style = "openai"
backend = "generic"

[[models]]
name = "qwen3-next-80b"          # Exact name used by your local server
provider = "openai"
alias = "local-llama"
temperature = 0.2
input_price = 0.0
output_price = 0.0
