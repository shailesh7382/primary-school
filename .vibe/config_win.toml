# Windows-focused Vibe configuration (cmd.exe-friendly)
# Copy this file to %USERPROFILE%\.vibe\config.toml on Windows.

active_model = "local-llama"
auto_approve = true
api_timeout = 900.0
disable_welcome_banner_animation = true

# Keep all tools/skills enabled unless you explicitly lock them down.
enabled_tools = ["*"]
disabled_tools = []
enabled_skills = ["*"]
disabled_skills = []
skill_paths = [".vibe/skills"]

# Built-in tools: explicit always-allow for high-autonomy workflow.
[tools.bash]
permission = "always"
default_timeout = 300
max_output_bytes = 32000
# NOTE:
# - Tool name remains `bash`, but on Windows Vibe executes via COMSPEC/cmd.exe.
# - Prefer cmd-safe commands and avoid interactive shells.
allowlist = [
  "cd",
  "chcp",
  "dir",
  "echo",
  "findstr",
  "git add",
  "git branch",
  "git checkout",
  "git commit",
  "git diff",
  "git log",
  "git pull",
  "git push",
  "git status",
  "more",
  "set",
  "type",
  "ver",
  "where",
  "whoami"
]
denylist = [
  "powershell -NoExit",
  "pwsh -NoExit",
  "diskpart",
  "format ",
  "shutdown ",
  "cipher /w",
  "rmdir /s",
  "del /f /s /q"
]
denylist_standalone = ["powershell", "pwsh"]

[tools.read_file]
permission = "always"

[tools.write_file]
permission = "always"

[tools.search_replace]
permission = "always"

[tools.grep]
permission = "always"

[tools.task]
permission = "always"

[tools.todo]
permission = "always"

[tools.web_search]
permission = "always"

[tools.web_fetch]
permission = "always"

[tools.ask_user_question]
permission = "always"

# Common MCP tool names observed in runtime payloads.
[tools.fetch_fetch]
permission = "always"

[tools.git_git_status]
permission = "always"

[tools.git_git_diff_unstaged]
permission = "always"

[tools.git_git_diff_staged]
permission = "always"

[tools.git_git_diff]
permission = "always"

[tools.git_git_add]
permission = "always"

[tools.git_git_reset]
permission = "always"

[tools.git_git_commit]
permission = "always"

[tools.git_git_log]
permission = "always"

[tools.git_git_show]
permission = "always"

[tools.git_git_branch]
permission = "always"

[tools.git_git_create_branch]
permission = "always"

[tools.git_git_checkout]
permission = "always"

[tools.time_get_current_time]
permission = "always"

[tools.time_convert_time]
permission = "always"

[tools.sequential_thinking]
permission = "always"

[tools.playwright_browser_close]
permission = "always"

[tools.playwright_browser_resize]
permission = "always"

[tools.playwright_browser_console_messages]
permission = "always"

[tools.playwright_browser_handle_dialog]
permission = "always"

[tools.playwright_browser_evaluate]
permission = "always"

[tools.playwright_browser_file_upload]
permission = "always"

[tools.playwright_browser_fill_form]
permission = "always"

[tools.playwright_browser_install]
permission = "always"

[tools.playwright_browser_press_key]
