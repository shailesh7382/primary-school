# MCP servers launched through cmd so this works even when bash is unavailable.
[[mcp_servers]]
name = "playwright"
transport = "stdio"
command = "cmd"
args = ["/c", "npx", "-y", "@playwright/mcp@latest"]
startup_timeout_sec = 30.0
tool_timeout_sec = 120.0
sampling_enabled = true

[[mcp_servers]]
name = "windows-mcp"
transport = "stdio"
command = "cmd"
args = ["/c", "uvx", "windows-mcp"]
startup_timeout_sec = 30.0
tool_timeout_sec = 120.0
env = { ANONYMIZED_TELEMETRY = "false" }
sampling_enabled = true

[[mcp_servers]]
name = "filesystem"
transport = "stdio"
command = "cmd"
args = ["/c", "uvx", "mcp-server-filesystem", "%USERPROFILE%\\codebase-new\\primary-school"]
sampling_enabled = true

[[mcp_servers]]
name = "fetch"
transport = "stdio"
command = "cmd"
args = ["/c", "uvx", "mcp-server-fetch"]
sampling_enabled = true

[[mcp_servers]]
name = "git"
transport = "stdio"
command = "cmd"
args = ["/c", "uvx", "mcp-server-git", "--repository", "%USERPROFILE%\\codebase-new\\primary-school"]
sampling_enabled = true

[[mcp_servers]]
name = "memory"
transport = "stdio"
command = "cmd"
args = ["/c", "uvx", "mcp-server-memory"]
sampling_enabled = true

[[mcp_servers]]
name = "time"
transport = "stdio"
command = "cmd"
args = ["/c", "uvx", "mcp-server-time"]
sampling_enabled = true

[[mcp_servers]]
name = "sequential-thinking"
transport = "stdio"
command = "cmd"
args = ["/c", "npx", "-y", "@modelcontextprotocol/server-sequential-thinking"]
sampling_enabled = true

[[mcp_servers]]
name = "clickhouse"
transport = "stdio"
command = "cmd"
args = ["/c", "npx", "-y", "@clickhouse/mcp-clickhouse"]
env = { CLICKHOUSE_HOST = "127.0.0.1", CLICKHOUSE_PORT = "8123", CLICKHOUSE_USER = "default", CLICKHOUSE_PASSWORD = "dummy_password", CLICKHOUSE_DATABASE = "default", CLICKHOUSE_SECURE = "false" }
sampling_enabled = true

# SharePoint support via Microsoft 365 Graph tools.
# Note: --org-mode is required to expose SharePoint site/list/drive tools.
[[mcp_servers]]
name = "ms365-sharepoint"
transport = "stdio"
command = "cmd"
args = ["/c", "npx", "-y", "@softeria/ms-365-mcp-server", "--org-mode"]
startup_timeout_sec = 45.0
tool_timeout_sec = 180.0
env = { MS365_MCP_ORG_MODE = "true", MS365_MCP_TENANT_ID = "common", MS365_MCP_CLOUD_TYPE = "global", LOG_LEVEL = "info" }
sampling_enabled = true

# SSH remoting (Windows host driving SSH to Unix/Linux targets).
[[mcp_servers]]
name = "ssh-remote"
transport = "stdio"
command = "cmd"
args = ["/c", "npx", "-y", "@aiondadotcom/mcp-ssh"]
startup_timeout_sec = 30.0
tool_timeout_sec = 180.0
sampling_enabled = true

[[providers]]
name = "openai"
api_base = "http://127.0.0.1:1234/v1"
api_key_env_var = ""
api_style = "openai"
backend = "generic"

[[models]]
name = "qwen3-next-80b"
provider = "openai"
alias = "local-llama"
temperature = 0.2
input_price = 0.0
output_price = 0.0
